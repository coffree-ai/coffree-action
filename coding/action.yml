name: 'Coffree coding runner'
description: |
  Real coffree coding-job runner. Picks proxy tokens up from the
  api-proxy service container, downloads the coffree CLI, installs gh /
  gitleaks if needed, exchanges a GHA OIDC token for a job_token,
  configures the gh / git credential shims, runs `coffree run-job`, and
  cleans up the shim directory in a post step.

  Spec: docs/specs/job-execution/gha-runtime.md §3-§4 and
  docs/specs/job-execution/credential-isolation.md §2-§5 in the
  coffree-ai/coffree repository.

inputs:
  job_id:
    description: 'Job ID issued by coffree server (workflow_dispatch input).'
    required: true
  server_url:
    description: |
      Coffree server URL: scheme + host, no trailing slash.
      Example: https://coffree.example.com
      Used both as the exchange-token endpoint host and as the OIDC audience
      (server-side audience check requires exact match per
      docs/specs/auth/overview.md runner authentication).
    required: true
  llm_base_url:
    description: |
      Optional URL for the local LLM / OpenAI-compatible endpoint
      (provider = `ollama` / `openai-compatible`). Empty disables the
      local route — SaaS-only deployments may omit this. See
      docs/specs/job-execution/gha-runtime.md §3.1 / §4.6.
    required: false
    default: ''
  llm_api_key:
    description: |
      Optional credential for the local LLM / OpenAI-compatible endpoint
      (e.g. OpenRouter). Ollama / vLLM single-node deployments may leave
      this blank. Passed alongside `llm_base_url`.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Acquire proxy tokens
      shell: bash
      env:
        COFFREE_SHIM_STAGING_DIR: ${{ runner.temp }}/coffree-shim-staging
      run: |
        set -euo pipefail

        TOKEN_FILE="${RUNNER_TEMP}/coffree-tokens/tokens.json"
        CAPS_FILE="${RUNNER_TEMP}/coffree-tokens/capabilities.json"

        # Install the cleanup trap BEFORE any guard exits. rm -f is silent
        # on missing files so this is safe to fire even if the files do not
        # yet exist (gha-runtime.md §3.5: "read then immediate delete").
        # shellcheck disable=SC2064
        trap "rm -f -- '${TOKEN_FILE}' '${CAPS_FILE}'" EXIT

        if [ ! -f "${TOKEN_FILE}" ]; then
          echo "::error::Missing ${TOKEN_FILE}; api-proxy service container did not write tokens.json. Check that ghcr.io/coffree-ai/api-proxy is healthy and that services.api-proxy.volumes mounts \${{ runner.temp }}/coffree-tokens:/tokens (gha-runtime.md §2.1 §3.5)."
          exit 1
        fi
        if [ ! -f "${CAPS_FILE}" ]; then
          echo "::error::Missing ${CAPS_FILE}; api-proxy did not write capabilities.json (gha-runtime.md §3.5)."
          exit 1
        fi

        # Slurp both JSON files into bash variables in one read each, then
        # delete the files immediately. spec gha-runtime.md §3.5 wants
        # "read then immediate delete" so the agent (which runs in the same
        # UID and can read $RUNNER_TEMP) cannot reach the files. The trap
        # remains as a backstop in case the rm fails.
        tokens_json=$(cat "${TOKEN_FILE}")
        caps_json=$(cat "${CAPS_FILE}")
        rm -f -- "${TOKEN_FILE}" "${CAPS_FILE}"

        # Subsequent jq invocations read from the in-memory strings.
        api_proxy_token=$(jq -r '.api_proxy_token // empty' <<<"${tokens_json}")
        credential_proxy_token=$(jq -r '.credential_proxy_token // empty' <<<"${tokens_json}")
        api_proxy_url=$(jq -r '.api_proxy_url // empty' <<<"${caps_json}")
        # Validate the providers array shape AND each element against the
        # allowlist via jq before joining. jq -e exits non-zero on the
        # `error()` call, which trips `set -e`. Using jq (not bash regex)
        # means we type-assert that providers is an array of strings.
        saas_providers=$(jq -er '
          if (.providers|type) != "array" then
            error("capabilities.providers must be an array")
          else
            .providers
            | map(
                if (type == "string" and (. == "anthropic" or . == "openai" or . == "google"))
                then .
                else error("invalid provider: " + tostring) end
              )
            | join(",")
          end
        ' <<<"${caps_json}") || {
          echo "::error::Invalid providers in capabilities.json (allowlist: anthropic / openai / google per credential-isolation.md §2.4)"
          exit 1
        }

        if [ -z "${api_proxy_token}" ] || [ -z "${credential_proxy_token}" ] || [ -z "${api_proxy_url}" ]; then
          echo "::error::Required token fields missing from tokens.json / capabilities.json (api_proxy_token / credential_proxy_token / api_proxy_url)."
          exit 1
        fi

        # Validate shapes before propagating. credential_proxy_token will be
        # interpolated into shim shell scripts (credential-isolation.md §4.2);
        # api_proxy_url will be interpolated via sed -e "s|...|${url}|g".
        # api_proxy_token is written to $GITHUB_ENV.
        # Use bash `[[ ... =~ ... ]]` instead of `grep -qE`; bash regex is
        # whole-string matching so a value containing a newline (e.g.
        # "abc\nBASH_ENV=/tmp/pwn") fails, while grep would match per line
        # and let the second line slip into $GITHUB_ENV.
        token_re='^[A-Za-z0-9_-]+$'
        if [[ ! ${credential_proxy_token} =~ ${token_re} ]]; then
          echo "::error::credential_proxy_token contains characters outside [A-Za-z0-9_-]"
          exit 1
        fi
        if [[ ! ${api_proxy_token} =~ ${token_re} ]]; then
          echo "::error::api_proxy_token contains characters outside [A-Za-z0-9_-]"
          exit 1
        fi
        # api_proxy_url: http(s) scheme + host (alphanum + . + -) + optional
        # :port + optional /path. Excludes sed metachars (| & \ newline) and
        # shell metachars (" ' $ ` ; etc).
        url_re='^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/[A-Za-z0-9._-]*)*$'
        if [[ ! ${api_proxy_url} =~ ${url_re} ]]; then
          echo "::error::api_proxy_url has invalid format: ${api_proxy_url}"
          exit 1
        fi

        # Mask both tokens before any subsequent log line could expose them.
        echo "::add-mask::${api_proxy_token}"
        echo "::add-mask::${credential_proxy_token}"

        # Stage credential_proxy_token + api_proxy_url for the Configure
        # credential shims step. Keep them off $GITHUB_ENV so they are not
        # inherited by the `coffree run-job` (= agent) process. Per
        # credential-isolation.md §5.2 denylist:
        # - CREDENTIAL_PROXY_TOKEN must not appear in agent env
        # - CREDENTIAL_PROXY_URL must not appear in agent env
        mkdir -p "${COFFREE_SHIM_STAGING_DIR}"
        chmod 700 "${COFFREE_SHIM_STAGING_DIR}"
        printf '%s' "${credential_proxy_token}" > "${COFFREE_SHIM_STAGING_DIR}/credential_proxy_token"
        printf '%s' "${api_proxy_url}" > "${COFFREE_SHIM_STAGING_DIR}/api_proxy_url"
        chmod 600 "${COFFREE_SHIM_STAGING_DIR}/credential_proxy_token" \
                  "${COFFREE_SHIM_STAGING_DIR}/api_proxy_url"

        # Delete tokens.json and capabilities.json from the shared volume so
        # that the agent process (which runs in the same UID) cannot read
        # them later (gha-runtime.md §3.4 §3.5).
        rm -f "${TOKEN_FILE}" "${CAPS_FILE}"

        # Inject COFFREE_AI_PROXY_* env iff capabilities lists at least one
        # SaaS provider. Empty providers (= local-LLM-only deployment) means
        # the API proxy is unused and CLI runtime should not pin to it.
        if [ -n "${saas_providers}" ]; then
          {
            echo "COFFREE_AI_PROXY_TOKEN=${api_proxy_token}"
            echo "COFFREE_AI_PROXY_URL=${api_proxy_url}"
            echo "COFFREE_AI_PROXY_PROVIDERS=${saas_providers}"
          } >> "${GITHUB_ENV}"
          echo "[acquire] capabilities providers=${saas_providers}, COFFREE_AI_PROXY_* injected"
        else
          echo "[acquire] capabilities providers empty; COFFREE_AI_PROXY_* not injected (local-LLM-only deployment)"
        fi

    - name: Download coffree CLI
      shell: bash
      env:
        COFFREE_SERVER_URL: ${{ inputs.server_url }}
      run: |
        set -euo pipefail

        # Validate server_url shape FIRST so the validation also covers the
        # OIDC exchange + Run coffree paths even when COFFREE_CLI_PATH
        # short-circuits the download below. spec auth/overview.md and
        # gha-runtime.md §4.4 both require "scheme + host with no trailing
        # slash" so the OIDC `audience` claim stays intact.
        server_url_re='^https?://[A-Za-z0-9.-]+(:[0-9]+)?$'
        if [[ ! ${COFFREE_SERVER_URL} =~ ${server_url_re} ]]; then
          echo "::error::server_url must be scheme+host with no path / no trailing slash (e.g. https://coffree.example.com): ${COFFREE_SERVER_URL}"
          exit 1
        fi

        bin_dir="${RUNNER_TEMP}/coffree-bin"
        mkdir -p "${bin_dir}"
        bin_path="${bin_dir}/coffree"

        # Development / test override per gha-runtime.md §4.1: if
        # COFFREE_CLI_PATH is set in the job env, copy the local binary
        # instead of downloading. Useful for self-host integration tests
        # against a pre-built CLI without round-tripping through the server
        # download endpoint.
        if [ -n "${COFFREE_CLI_PATH:-}" ]; then
          if [ ! -f "${COFFREE_CLI_PATH}" ]; then
            echo "::error::COFFREE_CLI_PATH points to a missing file: ${COFFREE_CLI_PATH}"
            exit 1
          fi
          if [ ! -x "${COFFREE_CLI_PATH}" ]; then
            echo "::error::COFFREE_CLI_PATH is not executable: ${COFFREE_CLI_PATH}"
            exit 1
          fi
          cp -- "${COFFREE_CLI_PATH}" "${bin_path}"
          chmod +x "${bin_path}"
          echo "${bin_dir}" >> "${GITHUB_PATH}"
          echo "[download] using local coffree CLI from COFFREE_CLI_PATH=${COFFREE_CLI_PATH}"
          exit 0
        fi

        # Architecture detection per gha-runtime.md §4.1.
        case "$(uname -m)" in
          x86_64)  target="linux-x64" ;;
          aarch64) target="linux-arm64" ;;
          *)
            echo "::error::Unsupported runner architecture: $(uname -m). coffree CLI publishes linux-x64 / linux-arm64 only."
            exit 1
            ;;
        esac

        sum_path="${bin_dir}/coffree.sha256"
        bin_url="${COFFREE_SERVER_URL}/orchestrator/cli/download/${target}"
        sum_url="${bin_url}/sha256"

        echo "[download] fetching binary from ${bin_url}"
        if ! curl --fail-with-body -sSL -o "${bin_path}" "${bin_url}"; then
          echo "::error::Failed to download coffree CLI from ${bin_url}."
          rm -f "${bin_path}"
          exit 1
        fi
        echo "[download] fetching sha256 from ${sum_url}"
        if ! curl --fail-with-body -sSL -o "${sum_path}" "${sum_url}"; then
          echo "::error::Failed to download coffree CLI sha256 from ${sum_url}."
          rm -f "${bin_path}" "${sum_path}"
          exit 1
        fi

        expected=$(awk '{print $1}' "${sum_path}")
        if [ -z "${expected}" ]; then
          echo "::error::sha256 endpoint returned an empty checksum."
          rm -f "${bin_path}" "${sum_path}"
          exit 1
        fi
        actual=$(sha256sum "${bin_path}" | awk '{print $1}')
        if [ "${actual}" != "${expected}" ]; then
          echo "::error::coffree CLI checksum mismatch: expected ${expected}, got ${actual}. Discarding binary."
          rm -f "${bin_path}" "${sum_path}"
          exit 1
        fi

        chmod +x "${bin_path}"
        echo "${bin_dir}" >> "${GITHUB_PATH}"
        echo "[download] coffree CLI installed at ${bin_path} (target=${target})"

    - name: Install AI agent CLIs
      shell: bash
      run: |
        set -euo pipefail

        local_bin="${HOME}/.local/bin"
        path_added=0

        # gh CLI per gha-runtime.md §4.2: GitHub-hosted runners ship gh
        # pre-installed; on self-hosted runners install via the official
        # tarball into ${HOME}/.local/bin (root/sudo not required).
        if ! command -v gh >/dev/null 2>&1; then
          gh_version="2.62.0"
          case "$(uname -m)" in
            x86_64)  gh_arch="amd64" ;;
            aarch64) gh_arch="arm64" ;;
            *)       gh_arch="amd64" ;;
          esac
          gh_tarball="gh_${gh_version}_linux_${gh_arch}.tar.gz"
          gh_url="https://github.com/cli/cli/releases/download/v${gh_version}/${gh_tarball}"
          mkdir -p "${local_bin}"
          tmp=$(mktemp -d)
          # shellcheck disable=SC2064
          trap "rm -rf '${tmp}'" EXIT
          echo "[install] fetching gh CLI v${gh_version} (${gh_arch})"
          curl --fail-with-body -sSL -o "${tmp}/gh.tgz" "${gh_url}"
          tar -xzf "${tmp}/gh.tgz" -C "${tmp}"
          mv "${tmp}"/gh_*/bin/gh "${local_bin}/gh"
          chmod +x "${local_bin}/gh"
          path_added=1
          echo "[install] gh CLI v${gh_version} installed at ${local_bin}/gh"
          trap - EXIT
          rm -rf "${tmp}"
        else
          echo "[install] gh CLI already installed at $(command -v gh)"
        fi

        # gitleaks per gha-runtime.md §4.2.
        if ! command -v gitleaks >/dev/null 2>&1; then
          gitleaks_version="8.21.2"
          case "$(uname -m)" in
            x86_64)  gitleaks_arch="x64" ;;
            aarch64) gitleaks_arch="arm64" ;;
            *)       gitleaks_arch="x64" ;;
          esac
          gitleaks_tarball="gitleaks_${gitleaks_version}_linux_${gitleaks_arch}.tar.gz"
          gitleaks_url="https://github.com/gitleaks/gitleaks/releases/download/v${gitleaks_version}/${gitleaks_tarball}"
          mkdir -p "${local_bin}"
          tmp=$(mktemp -d)
          # shellcheck disable=SC2064
          trap "rm -rf '${tmp}'" EXIT
          echo "[install] fetching gitleaks v${gitleaks_version} (${gitleaks_arch})"
          curl --fail-with-body -sSL -o "${tmp}/gitleaks.tgz" "${gitleaks_url}"
          tar -xzf "${tmp}/gitleaks.tgz" -C "${tmp}"
          mv "${tmp}/gitleaks" "${local_bin}/gitleaks"
          chmod +x "${local_bin}/gitleaks"
          path_added=1
          echo "[install] gitleaks v${gitleaks_version} installed at ${local_bin}/gitleaks"
          trap - EXIT
          rm -rf "${tmp}"
        else
          echo "[install] gitleaks already installed at $(command -v gitleaks)"
        fi

        if [ "${path_added}" = "1" ]; then
          echo "${local_bin}" >> "${GITHUB_PATH}"
        fi

    - name: Exchange OIDC token
      id: oidc
      shell: bash
      env:
        COFFREE_SERVER_URL: ${{ inputs.server_url }}
        COFFREE_JOB_ID: ${{ inputs.job_id }}
      run: |
        set -euo pipefail
        echo "[oidc] exchanging GHA OIDC token at ${COFFREE_SERVER_URL}/auth/exchange-token"

        # ACTIONS_ID_TOKEN_REQUEST_{URL,TOKEN} are populated by the runner
        # only when the workflow declares `permissions: id-token: write`
        # (gha-runtime.md §4.4 error table).
        oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL:-}"
        oidc_request_token="${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
        if [ -z "${oidc_url}" ] && [ -z "${oidc_request_token}" ]; then
          echo "::error::GHA OIDC is not available. Add 'permissions: id-token: write' to the workflow that calls this action."
          exit 1
        fi
        if [ -z "${oidc_url}" ]; then
          echo "::error::ACTIONS_ID_TOKEN_REQUEST_URL is missing while ACTIONS_ID_TOKEN_REQUEST_TOKEN is present."
          exit 1
        fi
        if [ -z "${oidc_request_token}" ]; then
          echo "::error::ACTIONS_ID_TOKEN_REQUEST_TOKEN is missing while ACTIONS_ID_TOKEN_REQUEST_URL is present."
          exit 1
        fi

        # The OIDC request URL already carries `?api-version=...`, so append
        # `&audience=...`. Audience must equal the server's PUBLIC_URL
        # (scheme + host, no trailing slash) so the JWT `aud` claim matches
        # exactly on the server (auth/overview.md runner authentication).
        oidc_response=$(curl --fail-with-body -sS \
          -H "Authorization: bearer ${oidc_request_token}" \
          "${oidc_url}&audience=${COFFREE_SERVER_URL}") || {
          echo "::error::Failed to fetch OIDC token from the GHA OIDC provider."
          exit 1
        }
        oidc_token=$(printf '%s' "${oidc_response}" | jq -r '.value // empty')
        if [ -z "${oidc_token}" ]; then
          echo "::error::OIDC token response did not contain a 'value' field."
          exit 1
        fi
        echo "::add-mask::${oidc_token}"

        # Build exchange-token request body via jq for safe JSON escaping.
        request_body=$(jq -cn \
          --arg t "${oidc_token}" \
          --arg j "${COFFREE_JOB_ID}" \
          '{oidc_token: $t, job_id: $j}')

        # Retry policy per gha-runtime.md §4.4:
        #   500 / 503 -> retry up to 3 times after the initial attempt
        #     (4 attempts total, sleeping 1s, 2s, 4s between them)
        #   400 / 401 / 403 / 404 / 411 / 413 -> non-retryable, exit immediately
        # Network-layer failure (curl non-zero) is treated as immediate exit
        # because the spec's retry table only covers HTTP status codes.
        response_file="$(mktemp)"
        # shellcheck disable=SC2064
        trap "rm -f '${response_file}'" EXIT

        attempt=0
        max_attempts=4
        backoff=1
        job_token=""
        while :; do
          attempt=$((attempt + 1))
          http_status=$(curl -sS -o "${response_file}" -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            --data-binary "${request_body}" \
            "${COFFREE_SERVER_URL}/auth/exchange-token") || {
            echo "::error::curl failed to reach ${COFFREE_SERVER_URL}/auth/exchange-token."
            exit 1
          }

          if [ "${http_status}" = "200" ]; then
            # jq -e enforces JWT shape (header.payload.signature with
            # base64url chars only). If the value is malformed (newline /
            # shell metachar) or absent, jq exits non-zero and trips
            # `set -e`; the explicit `||` handler turns it into a clear
            # error message. This blocks newline injection from a malformed
            # 200 response into $GITHUB_ENV.
            job_token=$(jq -er '
              .job_token
              | select(type == "string" and test("^[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+$"))
            ' < "${response_file}") || {
              echo "::error::exchange-token returned 200 but the body did not contain a valid base64url JWT job_token."
              exit 1
            }
            break
          fi

          case "${http_status}" in
            400|401|403|404|411|413)
              echo "::error::exchange-token returned ${http_status} (non-retryable per gha-runtime §4.4):"
              cat "${response_file}" || true
              exit 1
              ;;
            500|503)
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "::error::exchange-token returned ${http_status} on attempt ${attempt}/${max_attempts} (giving up):"
                cat "${response_file}" || true
                exit 1
              fi
              echo "[oidc] exchange-token returned ${http_status}, retrying in ${backoff}s (attempt ${attempt}/${max_attempts})"
              cat "${response_file}" || true
              sleep "${backoff}"
              backoff=$((backoff * 2))
              ;;
            *)
              echo "::error::exchange-token returned unexpected status ${http_status}:"
              cat "${response_file}" || true
              exit 1
              ;;
          esac
        done

        echo "::add-mask::${job_token}"
        # Write to $GITHUB_OUTPUT (composite-step scoped) instead of
        # $GITHUB_ENV (job scoped) so the token is only visible to other
        # steps in this composite action — not to caller workflow steps
        # that run after `coffree-ai/coffree-action/coding`.
        # credential-isolation.md §5.2 lists COFFREE_JOB_TOKEN as a denied
        # env key so we must keep it off broad job env.
        echo "job_token=${job_token}" >> "${GITHUB_OUTPUT}"
        echo "[oidc] job_token obtained via OIDC exchange"

    - name: Configure credential shims
      shell: bash
      env:
        COFFREE_SHIM_STAGING_DIR: ${{ runner.temp }}/coffree-shim-staging
        COFFREE_SHIM_DIR_FILE: ${{ runner.temp }}/coffree-shim-dir
        COFFREE_JOB_TOKEN: ${{ steps.oidc.outputs.job_token }}
      run: |
        set -euo pipefail
        : "${COFFREE_JOB_TOKEN:?COFFREE_JOB_TOKEN is not set; the OIDC exchange step did not run}"

        stage_token_file="${COFFREE_SHIM_STAGING_DIR}/credential_proxy_token"
        stage_url_file="${COFFREE_SHIM_STAGING_DIR}/api_proxy_url"
        if [ ! -f "${stage_token_file}" ] || [ ! -f "${stage_url_file}" ]; then
          echo "::error::Missing staged credential proxy token / URL from Acquire step."
          exit 1
        fi
        credential_proxy_token=$(cat "${stage_token_file}")
        api_proxy_url=$(cat "${stage_url_file}")

        # Re-validate post-staging with the same strict character classes
        # used in the Acquire step. Use bash `[[ ... =~ ... ]]` so the
        # check matches the entire string (not per line); a value with a
        # newline must fail. credential_proxy_token and api_proxy_url are
        # interpolated into shim scripts via sed; they must not contain sed
        # metachars (| & \ newline) or shell metachars.
        token_re='^[A-Za-z0-9_-]+$'
        url_re='^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/[A-Za-z0-9._-]*)*$'
        if [[ ! ${credential_proxy_token} =~ ${token_re} ]]; then
          echo "::error::credential_proxy_token contains characters outside [A-Za-z0-9_-]"
          exit 1
        fi
        if [[ ! ${api_proxy_url} =~ ${url_re} ]]; then
          echo "::error::api_proxy_url has invalid format: ${api_proxy_url}"
          exit 1
        fi

        # Resolve the real gh binary BEFORE prepending the shim directory to
        # PATH. The Install AI agent CLIs step guarantees gh is installed.
        if ! command -v gh >/dev/null 2>&1; then
          echo "::error::gh CLI not found on PATH; the Install AI agent CLIs step should have installed it."
          exit 1
        fi
        gh_real_path=$(command -v gh)
        # gh_real_path will be interpolated into the shim script via sed;
        # require an absolute path with safe characters only.
        gh_path_re='^/[A-Za-z0-9._/-]+$'
        if [[ ! ${gh_real_path} =~ ${gh_path_re} ]]; then
          echo "::error::gh real path is not a safe absolute path: ${gh_real_path}"
          exit 1
        fi

        shim_dir=$(mktemp -d "${RUNNER_TEMP}/coffree-shims-XXXXXX")
        chmod 700 "${shim_dir}"

        # Record SHIM_DIR for the Cleanup step IMMEDIATELY after mktemp so
        # the post step has it even if any of the shim writes / sed / git
        # config fails partway through (credential-isolation.md §4.4
        # cleanup must scope to the action-created shim dir). Stays off
        # agent env per credential-isolation.md §5.2 denylist
        # (COFFREE_SHIM_DIR is denied).
        printf '%s' "${shim_dir}" > "${COFFREE_SHIM_DIR_FILE}"
        chmod 600 "${COFFREE_SHIM_DIR_FILE}"

        # gh shim per credential-isolation.md §4.2 with the gha-runtime.md
        # §4.5 subcommand allowlist (pr / repo / api / issue). The script
        # parses argv to find the first non-flag token, skipping known
        # value-bearing global flags (--repo / --hostname / -R / -H).
        cat > "${shim_dir}/gh" <<'SHIM_EOF'
        #!/bin/sh
        # coffree gh wrapper — fetches token from credential proxy then
        # execs the real gh. credential-isolation.md §4.2 / gha-runtime.md
        # §4.5 (subcommand allowlist).
        sub=""
        skip_next=0
        for arg in "$@"; do
          if [ "${skip_next}" = "1" ]; then
            skip_next=0
            continue
          fi
          case "${arg}" in
            --repo|--hostname|-R|-H)
              skip_next=1
              ;;
            -*)
              ;;
            *)
              sub="${arg}"
              break
              ;;
          esac
        done
        case "${sub}" in
          pr|repo|api|issue) ;;
          *)
            printf 'coffree: gh subcommand "%s" is not in the allowlist (pr, repo, api, issue)\n' "${sub}" >&2
            exit 1
            ;;
        esac
        _T=$(curl -sf -H "X-Proxy-Token: __CRED_TOKEN__" "__PROXY_URL__/github-token" | jq -r .token 2>/dev/null)
        if [ -n "${_T}" ]; then
          export GH_TOKEN="${_T}"
        else
          echo "coffree: warning: failed to fetch GitHub token from credential proxy" >&2
        fi
        unset _T
        exec "__GH_REAL__" "$@"
        SHIM_EOF

        # Substitute placeholders. Validated character classes guarantee no
        # sed metachars sneak in (alphanum / dash / underscore for the token,
        # http(s) URL for the proxy URL, real-path for the gh binary).
        sed -i \
          -e "s|__CRED_TOKEN__|${credential_proxy_token}|g" \
          -e "s|__PROXY_URL__|${api_proxy_url}|g" \
          -e "s|__GH_REAL__|${gh_real_path}|g" \
          "${shim_dir}/gh"
        chmod 555 "${shim_dir}/gh"

        # git credential helper per credential-isolation.md §4.3.
        cat > "${shim_dir}/git-credential-coffree" <<'HELPER_EOF'
        #!/bin/sh
        # coffree git credential helper — fetches token from credential
        # proxy. credential-isolation.md §4.3.
        case "$1" in
          get)
            T=$(curl -sf -H "X-Proxy-Token: __CRED_TOKEN__" "__PROXY_URL__/github-token" | jq -r .token 2>/dev/null)
            [ -n "${T}" ] && printf 'protocol=https\nhost=github.com\nusername=x-access-token\npassword=%s\n' "${T}"
            ;;
        esac
        HELPER_EOF

        sed -i \
          -e "s|__CRED_TOKEN__|${credential_proxy_token}|g" \
          -e "s|__PROXY_URL__|${api_proxy_url}|g" \
          "${shim_dir}/git-credential-coffree"
        chmod 555 "${shim_dir}/git-credential-coffree"

        # Configure git to use the helper at global scope. --replace-all
        # so any pre-existing values are replaced atomically (a multivar
        # config without --replace-all aborts when more than one value
        # is set). This overrides any helper actions/checkout might have
        # set on the repo (gha-runtime.md §4.5).
        git config --global --replace-all credential.helper "${shim_dir}/git-credential-coffree"

        # Prepend shim dir to PATH so `gh` resolves to the shim before the
        # real binary in subsequent steps.
        echo "${shim_dir}" >> "${GITHUB_PATH}"

        # NB: COFFREE_SHIM_STAGING_DIR is intentionally left in place. The
        # Run coffree step reads credential_proxy_token + api_proxy_url back
        # from it, exports CREDENTIAL_PROXY_URL / CREDENTIAL_PROXY_TOKEN to
        # the CLI process only (CLI's credential-resolver.ts contract per
        # credential-isolation.md §2.3 / §3.1), and then deletes the
        # staging dir before exec'ing the CLI so the credentials do not
        # live on disk during the agent run. Cleanup credential shims runs
        # `rm -rf` again as a defensive backstop on `if: always()`.

        echo "[shims] gh shim + git credential helper installed at ${shim_dir}"

    - name: Run coffree
      shell: bash
      env:
        COFFREE_SERVER_URL: ${{ inputs.server_url }}
        COFFREE_JOB_ID: ${{ inputs.job_id }}
        LLM_BASE_URL: ${{ inputs.llm_base_url }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        COFFREE_SHIM_STAGING_DIR: ${{ runner.temp }}/coffree-shim-staging
        COFFREE_JOB_TOKEN: ${{ steps.oidc.outputs.job_token }}
      run: |
        set -euo pipefail

        # =========================================================
        # 1. Scrub the scalar credential-isolation.md §5.2 denylist FIRST,
        #    using only bash builtins. This must happen before any
        #    external command runs so that LD_PRELOAD / LD_LIBRARY_PATH
        #    etc. cannot hijack the dynamic linker for `env` / `awk` /
        #    `cat` / etc. on the way to the BASH_FUNC enumeration below.
        # =========================================================
        # Keep COFFREE_JOB_TOKEN / COFFREE_AI_PROXY_* / LLM_BASE_URL /
        # LLM_API_KEY / COFFREE_SERVER_URL / COFFREE_JOB_ID — the CLI needs
        # them. CREDENTIAL_PROXY_URL / CREDENTIAL_PROXY_TOKEN are unset
        # here and re-exported below from the staged values so they only
        # ever come from the trusted source.
        builtin unset \
          API_PROXY_TOKEN \
          CREDENTIAL_PROXY_URL CREDENTIAL_PROXY_TOKEN \
          COFFREE_ANTHROPIC_API_KEY COFFREE_OPENAI_API_KEY COFFREE_GEMINI_API_KEY \
          ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN \
          OPENAI_API_KEY \
          GEMINI_API_KEY GOOGLE_GENERATIVE_AI_API_KEY \
          GITHUB_TOKEN GH_TOKEN \
          ACCESS_TOKEN REFRESH_TOKEN \
          ACTIONS_ID_TOKEN_REQUEST_URL ACTIONS_ID_TOKEN_REQUEST_TOKEN \
          ACTIONS_RUNTIME_TOKEN ACTIONS_CACHE_URL \
          CLAUDECODE COFFREE_SHIM_DIR \
          BASH_ENV ENV \
          LD_PRELOAD LD_LIBRARY_PATH \
          DYLD_INSERT_LIBRARIES DYLD_LIBRARY_PATH DYLD_FRAMEWORK_PATH \
          NODE_OPTIONS

        # =========================================================
        # 2. Scrub exported bash functions (DENIED_ENV_PREFIXES BASH_FUNC_
        #    per credential-isolation.md §5.2 / §8). Now that LD_PRELOAD
        #    etc. are unset above, external commands (`env` / `awk`) can
        #    safely run via `command` (which bypasses any same-named
        #    bash function). The raw env names contain shell metachars
        #    (foo%% / foo()) that break `unset`, so we save them in an
        #    array for the final `exec env "${args[@]}"` and remove the
        #    function bodies from this shell via `unset -f` after
        #    stripping the BASH_FUNC_ prefix and metachar suffix.
        # =========================================================
        declare -a _bash_func_unset_args=()
        while IFS= read -r _raw_name; do
          [ -n "${_raw_name}" ] || continue
          _bash_func_unset_args+=(-u "${_raw_name}")
          _fn_name="${_raw_name#BASH_FUNC_}"
          _fn_name="${_fn_name%%%%}"
          _fn_name="${_fn_name%%\(\)}"
          if [ -n "${_fn_name}" ]; then
            builtin unset -f -- "${_fn_name}" 2>/dev/null || true
          fi
        done < <(command env | command awk -F= '/^BASH_FUNC_/ {sub(/=.*/, "", $0); print}')

        : "${COFFREE_JOB_TOKEN:?COFFREE_JOB_TOKEN is not set; the OIDC exchange step did not run}"

        # =========================================================
        # 3. Read the staged credential proxy state. Configure credential
        #    shims left these on disk for this exact moment; we will
        #    delete the staging dir below before exec'ing the CLI so the
        #    agent (which inherits this shell's lifetime) cannot read it.
        # =========================================================
        stage_token_file="${COFFREE_SHIM_STAGING_DIR}/credential_proxy_token"
        stage_url_file="${COFFREE_SHIM_STAGING_DIR}/api_proxy_url"
        if [ ! -f "${stage_token_file}" ] || [ ! -f "${stage_url_file}" ]; then
          echo "::error::Missing staged credential proxy state (Configure credential shims step did not run)."
          exit 1
        fi
        credential_proxy_token=$(command cat "${stage_token_file}")
        api_proxy_url=$(command cat "${stage_url_file}")

        # Re-validate post-staging using bash regex (whole-string match,
        # not line-oriented like grep -qE). credential_proxy_token and
        # api_proxy_url must not contain newlines or sed metachars even
        # at this final read; the api-proxy is trusted but disk is shared.
        token_re='^[A-Za-z0-9_-]+$'
        url_re='^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/[A-Za-z0-9._-]*)*$'
        if [[ ! ${credential_proxy_token} =~ ${token_re} ]]; then
          echo "::error::credential_proxy_token contains characters outside [A-Za-z0-9_-]"
          exit 1
        fi
        if [[ ! ${api_proxy_url} =~ ${url_re} ]]; then
          echo "::error::api_proxy_url has invalid format: ${api_proxy_url}"
          exit 1
        fi

        # =========================================================
        # 4. Inject the credential proxy contract for the CLI's resolver.
        #    These env vars are on the §5.2 denylist for *agent* env; the
        #    CLI's buildAgentEnv() strips them when spawning agent
        #    subprocesses, so the agent never sees them. The CLI itself
        #    needs them to construct the credential resolver
        #    (credential-isolation.md §2.3 / §3.1).
        # =========================================================
        export CREDENTIAL_PROXY_URL="${api_proxy_url}"
        export CREDENTIAL_PROXY_TOKEN="${credential_proxy_token}"

        # =========================================================
        # 5. Delete the staging dir BEFORE exec so the file does not live
        #    on disk during the agent run. Cleanup credential shims still
        #    runs `rm -rf` as a defensive backstop on `if: always()`.
        # =========================================================
        command rm -rf -- "${COFFREE_SHIM_STAGING_DIR}"
        builtin unset COFFREE_SHIM_STAGING_DIR

        # COFFREE_AI_PROXY_TOKEN / _URL / _PROVIDERS are injected by the
        # Acquire proxy tokens step iff capabilities lists at least one
        # SaaS provider; absence is normal for local-LLM-only deployments.
        # LLM_BASE_URL / LLM_API_KEY pass through from action inputs;
        # empty values disable the local-LLM route per the CLI's
        # provider-registry.
        echo "[run] starting coffree run-job"
        exec env "${_bash_func_unset_args[@]}" coffree run-job

    - name: Cleanup credential shims
      if: always()
      shell: bash
      env:
        COFFREE_SHIM_DIR_FILE: ${{ runner.temp }}/coffree-shim-dir
        COFFREE_SHIM_STAGING_DIR: ${{ runner.temp }}/coffree-shim-staging
      run: |
        set -euo pipefail
        # Always-run cleanup per credential-isolation.md §4.4. Both branches
        # are tolerant of missing state because earlier steps may have
        # failed before producing it.
        shim_dir=""
        if [ -f "${COFFREE_SHIM_DIR_FILE}" ]; then
          recorded=$(cat "${COFFREE_SHIM_DIR_FILE}")
          # Validate strictly: parent must equal $RUNNER_TEMP, basename
          # must match coffree-shims-<alnum> (the mktemp -d template). A
          # plain prefix `case` would accept path traversal like
          # ${RUNNER_TEMP}/coffree-shims-x/../etc, so we split parent +
          # basename via bash parameter expansion and compare each. The
          # directory existence check is decoupled from the validation so
          # the helper unset below still fires even if the dir is already
          # gone (Run coffree may have removed it on success).
          shim_parent="${recorded%/*}"
          shim_base="${recorded##*/}"
          base_re='^coffree-shims-[A-Za-z0-9]+$'
          if [ "${shim_parent}" = "${RUNNER_TEMP}" ] && [[ ${shim_base} =~ ${base_re} ]]; then
            shim_dir="${recorded}"
            if [ -d "${shim_dir}" ]; then
              rm -rf -- "${shim_dir}"
              echo "[cleanup] removed shim dir ${shim_dir}"
            else
              echo "[cleanup] shim dir already absent: ${shim_dir}"
            fi
          else
            echo "[cleanup] refusing to remove unrecognised shim dir: ${recorded}"
          fi
          rm -f -- "${COFFREE_SHIM_DIR_FILE}"
        else
          echo "[cleanup] no shim dir to remove (Configure credential shims step did not run)"
        fi

        # Run coffree normally removes the staging dir before exec; this
        # is a defensive backstop for early-failure paths.
        if [ -d "${COFFREE_SHIM_STAGING_DIR}" ]; then
          rm -rf -- "${COFFREE_SHIM_STAGING_DIR}"
          echo "[cleanup] removed staging dir ${COFFREE_SHIM_STAGING_DIR}"
        fi

        # Unset the global git credential helper. Use --unset --fixed-value
        # so the literal action-installed helper string is matched and
        # removed even if other credential.helper entries exist (multivar)
        # or were added during the run. Returns non-zero when no match;
        # `|| true` swallows the case where the helper is already absent
        # (e.g. an earlier step removed it).
        if [ -n "${shim_dir}" ]; then
          expected_helper="${shim_dir}/git-credential-coffree"
          if git config --global --unset --fixed-value credential.helper "${expected_helper}" 2>/dev/null; then
            echo "[cleanup] credential helper unset"
          else
            echo "[cleanup] credential helper already absent or different value"
          fi
        else
          echo "[cleanup] credential helper not unset (no recorded shim dir)"
        fi
